<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AR Menu - Food Fits</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix@2.2.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
</head>
<body>

  <video id="camera" autoplay playsinline hidden></video>
  <canvas id="output"></canvas>

  <!-- Loading State -->
  <div id="loading" class="loading-overlay">
    <div class="spinner"></div>
    <p>Loading AR...</p>
  </div>

  <!-- Error State -->
  <div id="error" class="error-overlay hidden">
    <p id="error-text"></p>
    <button onclick="location.reload()">Retry</button>
  </div>

  <!-- Food Info Badge -->
  <div id="food-info" class="food-info hidden">
    <span id="food-name">Pizza</span>
    <span id="food-distance" class="distance-badge"></span>
  </div>

  <!-- Food Display -->
  <img id="food" src="pizza.svg" class="ar-food" hidden />

  <!-- Menu Bar -->
  <div id="menu" class="menu-bar">
    <div class="menu-item" onclick="changeFood('pizza.svg', 'Pizza', 'Delicious fresh pizza with premium toppings')" title="Pizza">
      <img src="pizza.svg" alt="Pizza">
      <span>Pizza</span>
    </div>
    <div class="menu-item" onclick="changeFood('burger.svg', 'Burger', 'Juicy burger with fresh ingredients')" title="Burger">
      <img src="burger.svg" alt="Burger">
      <span>Burger</span>
    </div>
    <div class="menu-item" onclick="changeFood('sushi.svg', 'Sushi', 'Fresh sushi with premium fish')" title="Sushi">
      <img src="sushi.svg" alt="Sushi">
      <span>Sushi</span>
    </div>
    <div class="menu-item" onclick="changeFood('taco.svg', 'Taco', 'Authentic tacos with fresh salsa')" title="Taco">
      <img src="taco.svg" alt="Taco">
      <span>Taco</span>
    </div>
    <div class="menu-item" onclick="changeFood('icecream.svg', 'Ice Cream', 'Creamy ice cream in various flavors')" title="Ice Cream">
      <img src="icecream.svg" alt="Ice Cream">
      <span>Ice Cream</span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
