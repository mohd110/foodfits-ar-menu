<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AR Menu - Food Fits</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix@2.2.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
</head>
<body>

  <video id="camera" autoplay playsinline hidden></video>
  <canvas id="output"></canvas>

  <!-- Loading State -->
  <div id="loading" class="loading-overlay">
    <div class="spinner"></div>
    <p>Loading AR...</p>
  </div>

  <!-- Error State -->
  <div id="error" class="error-overlay hidden">
    <p id="error-text"></p>
    <button onclick="location.reload()">Retry</button>
  </div>

  <!-- App Container -->
  <div class="app-container">
    <!-- Header -->
    <div class="app-header">
      <div class="status-bar"></div>
    </div>

    <!-- Main Content Card -->
    <div class="food-card">
      <!-- AR Preview Section -->
      <div class="ar-preview" id="ar-preview">
        <img id="food" src="pizza.png" class="ar-food" />
      </div>

      <!-- Food Info Section -->
      <div class="food-details">
        <h2 id="food-name">Pizza</h2>
        <p class="food-description" id="food-description">Delicious fresh pizza with premium toppings</p>
        <div class="food-meta">
          <span id="food-distance" class="distance-badge">Ready to order</span>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="action-buttons">
        <button class="btn btn-primary" onclick="orderFood()">ORDER NOW</button>
      </div>
    </div>

    <!-- Menu Bar -->
    <div id="menu" class="menu-bar">
      <div class="menu-item" onclick="changeFood('pizza.png', 'Pizza', 'Delicious fresh pizza with premium toppings')" title="Pizza">
        <img src="pizza.png" alt="Pizza">
        <span>Pizza</span>
      </div>
      <div class="menu-item" onclick="changeFood('burger.png', 'Burger', 'Juicy burger with fresh ingredients')" title="Burger">
        <img src="burger.png" alt="Burger">
        <span>Burger</span>
      </div>
      <div class="menu-item" onclick="changeFood('sushi.png', 'Sushi', 'Fresh sushi with premium fish')" title="Sushi">
        <img src="sushi.png" alt="Sushi">
        <span>Sushi</span>
      </div>
      <div class="menu-item" onclick="changeFood('taco.png', 'Taco', 'Authentic tacos with fresh salsa')" title="Taco">
        <img src="taco.png" alt="Taco">
        <span>Taco</span>
      </div>
      <div class="menu-item" onclick="changeFood('icecream.png', 'Ice Cream', 'Creamy ice cream in various flavors')" title="Ice Cream">
        <img src="icecream.png" alt="Ice Cream">
        <span>Ice Cream</span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
