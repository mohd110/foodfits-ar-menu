<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Cone -->
  <polygon points="150,180 100,250 200,250" fill="#DAA520"/>
  <!-- Cone texture -->
  <line x1="110" y1="200" x2="145" y2="210" stroke="#CD853F" stroke-width="1"/>
  <line x1="115" y1="215" x2="150" y2="225" stroke="#CD853F" stroke-width="1"/>
  <line x1="120" y1="230" x2="155" y2="240" stroke="#CD853F" stroke-width="1"/>
  <line x1="190" y1="200" x2="155" y2="210" stroke="#CD853F" stroke-width="1"/>
  <line x1="185" y1="215" x2="150" y2="225" stroke="#CD853F" stroke-width="1"/>
  <line x1="180" y1="230" x2="145" y2="240" stroke="#CD853F" stroke-width="1"/>
  
  <!-- Ice cream scoop 1 (bottom) -->
  <circle cx="150" cy="160" r="50" fill="#F08080"/>
  
  <!-- Ice cream scoop 2 (middle) -->
  <circle cx="150" cy="115" r="45" fill="#FFB6C1"/>
  
  <!-- Ice cream scoop 3 (top) -->
  <circle cx="150" cy="75" r="40" fill="#DDA0DD"/>
  
  <!-- Cherry on top -->
  <circle cx="150" cy="45" r="8" fill="#DC143C"/>
